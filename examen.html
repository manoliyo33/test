<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Examen TFA Sistemas de Información</title>
    <style>
        /* ... (todos tus estilos existentes, sin cambios) ... */
    </style>

    <script src="preguntas.js"></script>
    <script src="Examen1_TFA_SI.js"></script>
    <script src="Examen2_TFA_SI.js"></script>
    <script src="Examen1_TMFA_SI.js"></script>

    <script src="pdf.min.js"></script>
    <script src="pdf.worker.min.js"></script>
</head>
<body>

    <header class="app-header">
        <h1>📚 Simulador Examen Sistemas de Información</h1>
        <p class="subtitle">Practica por temas, realiza simulacros y revisa tus estadísticas</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tabExamenBtn" onclick="switchTab('examen')">📝 Por Temas</button>
        <button class="tab-btn" id="tabSimulacrosBtn" onclick="switchTab('simulacros')">📄 Simulacros</button>
        <button class="tab-btn" id="tabStatsBtn" onclick="switchTab('stats')">📊 Estadísticas</button>
        <button class="tab-btn" id="tabAddqBtn" onclick="switchTab('addq')">➕ Añadir</button>
        <!-- 🏠 BOTÓN DE INICIO -->
        <button class="tab-btn" onclick="goHome()" style="background:#f1f5f9; color:#0f172a; border:2px solid #e2e8f0;">🏠 Inicio</button>
    </div>

    <div class="container view active" id="view-examen">
        <!-- ... (todo el contenido de examen, sin cambios) ... -->
    </div>

    <div class="container view" id="view-simulacros">
        <!-- ... (todo el contenido de simulacros, sin cambios) ... -->
    </div>

    <div class="container view" id="view-stats">
        <!-- ... (todo el contenido de estadísticas, sin cambios) ... -->
    </div>

    <div class="container view" id="view-addq">
        <!-- ... (todo el contenido de añadir, sin cambios) ... -->
    </div>

    <script>
        // ... (todas tus variables y funciones existentes) ...

        // ===================================================
        //  🏠 VOLVER AL INICIO (sin recargar página)
        // ===================================================
        function goHome() {
            // 1. Detener el temporizador si está activo
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // 2. Restablecer variables de estado
            currentQuestions = [];
            markedForReview = new Set();
            examEtiqueta = '';
            
            // 3. Mostrar la sección de configuración
            document.getElementById('configSection').style.display = 'block';
            
            // 4. Ocultar la barra de progreso
            document.getElementById('examProgress').classList.remove('show');
            
            // 5. Limpiar el contenedor de preguntas
            document.getElementById('quizContainer').innerHTML = `
                <p class="empty-msg">
                    <span class="big-emoji">🎯</span>
                    Selecciona los temas y pulsa «Empezar Examen».
                </p>
            `;
            
            // 6. Limpiar resultados
            document.getElementById('resultContainer').innerHTML = '';
            
            // 7. Ocultar botón de corrección
            document.getElementById('submitBtn').style.display = 'none';
            
            // 8. Restablecer el temporizador visual
            document.getElementById('examTimer').textContent = '⏱️ 00:00';
            
            // 9. Asegurar que estamos en la pestaña de examen
            switchTab('examen');
            
            // 10. Scroll suave al inicio de la configuración
            document.getElementById('configSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ... (resto de tus funciones: switchTab, populateTopics, loadQuestions, etc.) ...
    </script>
</body>
</html>
